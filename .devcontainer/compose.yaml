# Compose-based devcontainer for pg_exporter.
#
# A single compose project defines the dev container (`app`) and the one backing
# service it needs (`postgres`). DevPod (devcontainer.json -> dockerComposeFile)
# brings both up together and execs into `app`, so the environment is fully
# self-contained. The default devcontainer is tuned for local podman/docker; use
# devcontainer.portable.json for remote providers that cannot apply local overrides.
#
# Inside the project network the app reaches the database by name at
# `postgres:5432` (container-to-container), so there is no host port-forward in the
# path. That sidesteps the rootless-podman/pasta bulk-COPY stalls entirely and means
# client-side pgbench works without any workaround.
#
# Trust boundary: local/dev only. Postgres uses trust auth. Never reuse outside a
# dev machine.

name: pg_exporter

networks:
  pg_exporter:
    driver: bridge

volumes:
  pgdata:
  cargo-registry:
  cargo-git:
  cargo-target:
  rustup:
  mise-data:
  mise-cache:
  # Persist Neovim plugins / treesitter / state across rebuilds so a recreate does
  # not re-download everything (the config itself comes from the chezmoi dotfiles).
  nvim-data:
  nvim-state:
  nvim-cache:
  # Observability profile (on-demand) persistence.
  prometheus-data:

services:
  app:
    image: mcr.microsoft.com/devcontainers/rust:trixie
    init: true
    user: vscode
    # Disable SELinux labeling for bind mounts (clean on fedora-atomic / rootless
    # podman) instead of per-mount :Z.
    security_opt:
      - label=disable
    # Keep the dev container alive; DevPod execs in and runs lifecycle hooks.
    command: sleep infinity
    environment:
      DEVPOD: "true"
      DEVPOD_WORKSPACE_ID: pg_exporter
      EDITOR: nvim
      VISUAL: nvim
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      CARGO_HOME: /home/vscode/.cargo
      # Target dir is a SUBDIR of the mounted volume so `cargo clean` can remove
      # it (removing the volume mount point itself fails with EBUSY).
      CARGO_TARGET_DIR: /home/vscode/.cargo/target/build
      MISE_DATA_DIR: /home/vscode/.local/share/mise
      MISE_CACHE_DIR: /home/vscode/.cache/mise
      MISE_CONFIG_DIR: /home/vscode/.config/mise
      MISE_CONFIG_FILE: /workspaces/pg_exporter/mise.toml
      # The test suite guards against accidentally running against a remote DB.
      # Inside the devcontainer the DB is a trusted, disposable compose sibling
      # reachable as `postgres` (not localhost), so opt in explicitly.
      PG_EXPORTER_TEST_ALLOW_NONLOCAL: "1"
      # The justfile/tests honor these; pointing them at the postgres service is
      # what makes `just test` work in-container with no host database.
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_EXPORTER_DSN: postgresql://postgres:postgres@postgres:5432/postgres
    volumes:
      - ..:/workspaces/pg_exporter
      - cargo-registry:/home/vscode/.cargo/registry
      - cargo-git:/home/vscode/.cargo/git
      - cargo-target:/home/vscode/.cargo/target
      - rustup:/home/vscode/.rustup
      - mise-data:/home/vscode/.local/share/mise
      - mise-cache:/home/vscode/.cache/mise
      - nvim-data:/home/vscode/.local/share/nvim
      - nvim-state:/home/vscode/.local/state/nvim
      - nvim-cache:/home/vscode/.cache/nvim
    networks:
      pg_exporter:
        aliases:
          - app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:18
    security_opt:
      - label=disable
    environment:
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      PGDATA: /var/lib/postgresql/data/pgdata
    # Preload pg_stat_statements via flags (required by the collectors/tests). Using
    # flags avoids mounting db/config/postgres/postgresql.conf, which hard-codes a
    # host log path.
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 3s
      retries: 40
    restart: unless-stopped
    networks:
      - pg_exporter
  # ---------------------------------------------------------------------------
  # Optional observability stack (Prometheus + Grafana) for dashboard work.
  # On-demand: gated behind the "observability" profile, so a plain `devpod up`
  # (which starts only app + postgres) stays lean. Bring it up with:
  #   just metrics-dev
  #   # or: <podman|docker> compose -f .devcontainer/compose.yaml --profile observability up -d
  # Prometheus scrapes the exporter at app:9432 over the compose network, so run
  # the exporter inside the app container first (e.g. `just watch`). Grafana
  # hot-reloads grafana/dashboard.json (file provider, ~10s) — no rebuild needed.
  # ---------------------------------------------------------------------------
  prometheus:
    image: docker.io/prom/prometheus:latest
    profiles: ["observability"]
    security_opt:
      - label=disable
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pg_exporter

  grafana:
    image: docker.io/grafana/grafana:latest
    profiles: ["observability"]
    security_opt:
      - label=disable
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      # Datasource -> the prometheus sibling service.
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      # Dashboard provider (allowUiUpdates=false, updateIntervalSeconds: 10) + the
      # dashboard JSON, bind-mounted from the repo so edits hot-reload without a
      # rebuild. The file is authoritative.
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/pg_exporter.yml:ro
      - ../grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
    # No grafana-data volume: Grafana state is fully provisioned from the files above,
    # so keeping it ephemeral guarantees every start re-reads the dashboard from disk
    # (a persisted volume can otherwise serve a stale, UI-saved copy).
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - pg_exporter
