# Prometheus config for the devcontainer "observability" profile.
# Scrapes the exporter over the compose network by service name (app:9432),
# so it works identically on macOS / Linux / Atomic with no host networking.
# Run the exporter inside the `app` container (e.g. `just watch`).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "pg-exporter"
    static_configs:
      - targets: ["app:9432"]
